<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social App Login</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:320px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    box-sizing:border-box;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4a6cf7;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.links{
    margin-top:15px;
    text-align:center;
}

.links a{
    text-decoration:none;
    color:#4a6cf7;
}
</style>
</head>
<body>

<div class="container">
    <h1>Social App</h1>

    <input type="text" placeholder="Username or Email">
    <input type="password" placeholder="Password">

    <button>Log In</button>

    <div class="links">
        <p><a href="#">Forgot Password?</a></p>
        <p><a href="#">Create Account</a></p>
    </div>
</div>

</body>
</html>
